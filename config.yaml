languageCode: "en-us"
baseUrl: "https://www.bavins.me"
title: "Vilhelms Bavins"
theme: "anubis"
paginate: 10
#disqusShortname: ""
#googleAnalytics: "G-12345"
enableRobotsTXT: true
defaultContentLanguage: lv
languages:
  lv:
    languageName: Latviešu
    contentDir: content/latvian
    title: Mans Blogs
    weight: 1
    menu:
      main:
      - identifier: posts
        name: Raksti
        title: Posts
        url: /posts/
        weight: 1
      - identifier: contacts
        name: Kontakti
        title: Contacts
        url: /contacts/
        weight: 2
      - identifier: about
        name: Par mani
        title: About Me
        url: /about/
        weight: 3
  en:
    languageName: English
    contentDir: content/english
    title: My Blog
    weight: 2
    menu:
      main:
      - identifier: posts
        name: Posts
        title: Posts
        url: /posts/
        weight: 1
      - identifier: contacts
        name: Contacts
        title: Contacts
        url: /contacts/
        weight: 2
      - identifier: about
        name: About Me
        title: About Me
        url: /about/
        weight: 3

params:
  author: "Vilhelms Bavins"
  email: vilhelmsbavins@gmail.com # used for microformats
  #avatar: "/images/me.png" # used for microformats
  description: "This is my personal website!"
  # Uncomment if you need this
  # images:
  #   - images/og-featured.png # relative path to "static" directory
  # customCSS:
  #   - css/my.css # relative path to "assets" directory (don't use main.css filename)
  # customJS:
  #   - js/main.js # relative path to "assets" directory
  dateFormat: "02-01-2006"
  paginationSinglePost: true
  style: dark-with-switcher
  readMore: true # show read more button
  readNextPosts: 0  # show 5 related posts, 0 by default
  disableSummary: false
  copyCodeButton: true # true by default
  rssAsSocialIcon: false
  # utteranc.es support
  utterancesRepo: ""  # mandatory
  utterancesTheme: "" # optional
  utterancesIssue: "" # optional
  utterancesLabel: "" # optional
  # isso support
  isso:
    enabled: true # mandatory
    data: "https://comments.example.com/" # mandatory
    jsLocation: "https://comments.example.com/js/embed.min.js" # mandatory
    css: true # optional
    lang: "de" # optional
    replyToSelf: true # mandatory
    requireAuthor: true # mandatory
    requireEmail: true # mandatory
    id: "thread-id" # optional
    avatar: true # optional
    avatar-bg: "#f0f0f0" # optional
    feed: false # optional
  graphcommentId: ""
  webmentions:
    url: https://yourdomain.com/webemntions/receive
    login: hugo-theme-anubis
    pingback: true
  social:
  - id: github
    name: villhelmms
  - id: instagram
    name: villhelmms
  - id: reddit
    name: villhelmms
  - id: spotify
    name: o613w1t5n87swodx9i6v0vpiq
#  - id: hugo
#    url: "https://gohugo.io/"
#    icon: "hugo"

markup:
  goldmark:
    renderer:
      unsafe: true # enable raw HTML in Markdown